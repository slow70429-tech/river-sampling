<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>河川採樣助手 V7</title>
<meta name="theme-color" content="#0f172a">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
  background:#0f172a;color:#f8fafc;min-height:100vh;padding:18px 8px 8px;
}
.app{max-width:1040px;margin:0 auto}
.header{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  margin:2px 0 8px;
}
h1{font-size:22px;margin:0;font-weight:950}
.badge{
  background:#022c22;color:#86efac;border:1px solid #166534;
  border-radius:999px;padding:5px 10px;font-size:13px;font-weight:900;
}
.panel{
  background:#111827;border:1px solid #334155;border-radius:16px;
  padding:10px;margin-bottom:8px;box-shadow:0 8px 18px rgba(0,0,0,.2);
}
.top{
  display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;
}
label{display:block;font-size:15px;font-weight:900;color:#cbd5e1;margin-bottom:4px}
input{
  width:100%;font-size:26px;padding:8px 10px;border-radius:12px;
  border:2px solid #475569;background:#020617;color:#fff;outline:none;
}
input:focus{border-color:#38bdf8}
button{
  height:48px;min-width:86px;border:0;border-radius:12px;
  background:#334155;color:#fff;font-size:18px;font-weight:950;
}
.mode{
  font-size:24px;font-weight:950;color:#fde68a;line-height:1;
  padding:12px 10px;border:1px solid #334155;border-radius:12px;background:#020617;text-align:center;
}
.river{
  position:relative;height:82px;background:#020617;border:1px solid #334155;
  border-radius:15px;margin-top:8px;overflow:hidden;
}
.bar{position:absolute;left:14px;right:14px;top:36px;height:5px;background:#64748b;border-radius:99px}
.mark{position:absolute;top:10px;transform:translateX(-50%);text-align:center;min-width:62px}
.mark .n{font-size:12px;font-weight:950;color:#e2e8f0}
.mark .dot{width:11px;height:11px;background:#38bdf8;border:2px solid #e0f2fe;border-radius:50%;margin:14px auto 0}
.mark .p{font-size:17px;font-weight:950;color:#7dd3fc;margin-top:8px}
.w0,.wend{position:absolute;top:61px;color:#cbd5e1;font-size:11px;font-weight:900}
.w0{left:9px}.wend{right:9px}
.table{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.col{
  background:#0b1220;border:1px solid #334155;border-radius:16px;padding:9px;
}
.colHead{
  display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;margin-bottom:7px;
}
.icon{
  width:34px;height:34px;border-radius:12px;background:#1e293b;
  display:flex;align-items:center;justify-content:center;font-weight:950;color:#7dd3fc;
}
.name{font-size:20px;font-weight:950}
.pos{font-size:14px;color:#7dd3fc;font-weight:950}
.depthRow{display:grid;grid-template-columns:1fr;gap:4px;margin-bottom:7px}
.depthLabel{font-size:13px;color:#cbd5e1;font-weight:900}
.col input{font-size:24px;padding:7px 9px}
.rule{
  min-height:29px;color:#fde68a;font-size:13px;font-weight:900;line-height:1.25;margin:5px 0;
}
.results{display:grid;gap:5px}
.res{
  display:grid;grid-template-columns:54px 1fr;align-items:center;
  background:#020617;border:1px solid #334155;border-radius:11px;padding:6px;
}
.tag{
  font-size:14px;font-weight:950;border-radius:9px;padding:5px 0;text-align:center;color:#0f172a;
}
.t02{background:#93c5fd}.t06{background:#86efac}.t08{background:#fdba74}
.val{text-align:right;font-size:21px;font-weight:950;color:#f8fafc}
.warn{font-size:12px;color:#fecaca;font-weight:850;line-height:1.3;margin-top:5px}
.summary{
  font-size:14px;line-height:1.5;color:#e2e8f0;
}
.summary b{color:#7dd3fc}
.hidden{display:none!important}

/* V7.1：只放大河寬輸入區，其他功能不動 */

/* V7.1：只放大河寬輸入區，其他功能不變 */
label[for="width"]{font-size:22px;color:#e2e8f0;margin-bottom:8px}
#width{font-size:46px;font-weight:800;padding:12px 16px;min-height:76px;border-radius:16px}
.top{grid-template-columns:1.35fr 1fr auto}
@media(max-width:760px){
  body{padding:22px 6px 6px}
  .header{margin-bottom:6px}
  h1{font-size:20px}
  .badge{font-size:12px;padding:4px 8px}
  .panel{padding:8px;margin-bottom:7px}
  .top{grid-template-columns:1.35fr .65fr}
  .top .clearWrap{grid-column:1/3}
  label[for="width"]{font-size:22px}
  #width{font-size:44px;min-height:74px;padding:12px 16px}
  button{width:100%;height:42px;font-size:17px}
  input{font-size:23px;padding:7px 9px}
  .mode{font-size:20px;padding:10px 6px}
  .river{height:82px}
  .bar{top:36px}
  .mark{top:10px}
  .mark .p{font-size:17px;margin-top:8px}
  .w0,.wend{top:61px}
  .table{grid-template-columns:repeat(3,1fr);gap:5px}
  .col{padding:6px;border-radius:13px}
  .colHead{grid-template-columns:1fr;gap:2px;margin-bottom:5px}
  .icon{display:none}
  .name{font-size:16px}
  .pos{font-size:13px}
  .depthLabel{font-size:12px}
  .col input{font-size:20px;padding:7px}
  .rule{font-size:11px;min-height:36px}
  .res{grid-template-columns:42px 1fr;padding:5px}
  .tag{font-size:12px;padding:4px 0}
  .val{font-size:17px}
  .summary{font-size:13px}
}
@media(max-width:420px){
  #width{font-size:42px;min-height:72px}


  .table{gap:4px}
  .col{padding:5px}
  .name{font-size:15px}
  .pos{font-size:12px}
  .col input{font-size:19px}
  .val{font-size:16px}
}
</style>
</head>
<body>
<main class="app">
  <div class="header">
    <h1>河川採樣助手 V7</h1>
    <div class="badge">一頁版</div>
  </div>

  <section class="panel">
    <div class="top">
      <div>
        <label for="width">河寬 m</label>
        <input id="width" type="number" inputmode="decimal" min="0" step="0.1" placeholder="25.6">
      </div>
      <div>
        <label>採樣方式</label>
        <div class="mode" id="mode">—</div>
      </div>
      <div class="clearWrap">
        <button id="clearBtn" type="button">清除</button>
      </div>
    </div>

    <div class="river">
      <div class="bar"></div><div class="w0">0m</div><div class="wend" id="endWidth">—</div>
      <div class="mark" id="lineLeft" style="left:25%"><div class="n">左</div><div class="dot"></div><div class="p" id="leftLinePos">—</div></div>
      <div class="mark" id="lineMid" style="left:50%"><div class="n">中</div><div class="dot"></div><div class="p" id="midLinePos">—</div></div>
      <div class="mark" id="lineRight" style="left:75%"><div class="n">右</div><div class="dot"></div><div class="p" id="rightLinePos">—</div></div>
    </div>
  </section>

  <section class="table">
    <div class="col" id="leftCard">
      <div class="colHead">
        <div class="icon">左</div>
        <div><div class="name">左岸</div><div class="pos" id="leftPos">—</div></div>
      </div>
      <div class="depthRow">
        <div class="depthLabel">水深 cm</div>
        <input id="leftDepth" type="number" inputmode="decimal" min="0" step="1" placeholder="201">
      </div>
      <div class="rule" id="leftRule">—</div>
      <div class="results" id="leftRows"></div>
      <div class="warn" id="leftWarn"></div>
    </div>

    <div class="col" id="midCard">
      <div class="colHead">
        <div class="icon">中</div>
        <div><div class="name">中央</div><div class="pos" id="midPos">—</div></div>
      </div>
      <div class="depthRow">
        <div class="depthLabel">水深 cm</div>
        <input id="midDepth" type="number" inputmode="decimal" min="0" step="1" placeholder="204">
      </div>
      <div class="rule" id="midRule">—</div>
      <div class="results" id="midRows"></div>
      <div class="warn" id="midWarn"></div>
    </div>

    <div class="col" id="rightCard">
      <div class="colHead">
        <div class="icon">右</div>
        <div><div class="name">右岸</div><div class="pos" id="rightPos">—</div></div>
      </div>
      <div class="depthRow">
        <div class="depthLabel">水深 cm</div>
        <input id="rightDepth" type="number" inputmode="decimal" min="0" step="1" placeholder="198">
      </div>
      <div class="rule" id="rightRule">—</div>
      <div class="results" id="rightRows"></div>
      <div class="warn" id="rightWarn"></div>
    </div>
  </section>

  <section class="panel">
    <div class="summary" id="summary">輸入河寬與水深後，自動產生採樣摘要。</div>
  </section>
</main>

<script>
const $=id=>document.getElementById(id);
const ids=["left","mid","right"];
const zh={left:"左岸",mid:"中央",right:"右岸"};
function num(v){return parseFloat(v)}
function ok(x){return Number.isFinite(x)&&x>0}
function f1(x){return Number.isFinite(x)?(Math.round(x*10)/10).toFixed(1):"—"}
function f2(x){return Number.isFinite(x)?(Math.round(x*100)/100).toFixed(2):"—"}

function rule(cm){
  if(!ok(cm)) return {name:"—",rows:[],warn:"",text:"—"};
  const h=cm/100;
  if(h<=0.5) return {name:"≤50cm：人工確認",rows:[],warn:"SOP 表列從 50cm 以上開始",text:"人工確認"};
  if(h<=1.5){let rows=[["0.6h",h*.6,"t06"]]; return {name:"50–150cm：0.6h",rows,warn:"",text:rows.map(r=>`${r[0]} ${f2(r[1])}m`).join("、")};}
  if(h<3){let rows=[["0.2h",h*.2,"t02"],["0.8h",h*.8,"t08"]]; return {name:"150–300cm：0.2h、0.8h",rows,warn:"",text:rows.map(r=>`${r[0]} ${f2(r[1])}m`).join("、")};}
  let rows=[["0.2h",h*.2,"t02"],["0.6h",h*.6,"t06"],["0.8h",h*.8,"t08"]];
  return {name:"≥300cm：0.2h、0.6h、0.8h",rows,warn:"",text:rows.map(r=>`${r[0]} ${f2(r[1])}m`).join("、")};
}

function renderRows(el, arr){
  el.innerHTML=arr.map(r=>`<div class="res"><div class="tag ${r[2]}">${r[0]}</div><div class="val">${f2(r[1])} m</div></div>`).join("");
}

function calc(){
  const w=num($("width").value), valid=ok(w), three=valid&&w>6;
  $("mode").textContent=!valid?"—":(three?"三點":"中央");
  $("endWidth").textContent=valid?f1(w)+"m":"—";
  const p={left:valid?w/4:NaN, mid:valid?w/2:NaN, right:valid?w*3/4:NaN};

  ids.forEach(id=>{
    const t=f1(p[id])+" m";
    $(id+"Pos").textContent=t;
    $(id+"LinePos").textContent=t;
  });

  ["leftCard","rightCard","lineLeft","lineRight"].forEach(id=>$(id).classList.toggle("hidden",!three));

  let active=three?ids:["mid"];
  let out=[];
  ids.forEach(id=>{
    const cm=num($(id+"Depth").value);
    const r=rule(cm);
    $(id+"Rule").textContent=r.name;
    renderRows($(id+"Rows"),r.rows);
    $(id+"Warn").textContent=r.warn;
    if(active.includes(id)){
      const depth=ok(cm)?`${cm}cm（${f2(cm/100)}m）`:"—";
      out.push(`<b>${zh[id]}</b>：位置 ${f1(p[id])}m｜水深 ${depth}｜採樣 ${r.text}`);
    }
  });
  $("summary").innerHTML=out.join("<br>");
}
$("clearBtn").addEventListener("click",()=>{$("width").value="";ids.forEach(id=>$(id+"Depth").value="");calc();});
$("width").addEventListener("input",calc);
ids.forEach(id=>$(id+"Depth").addEventListener("input",calc));
calc();
</script>
</body>
</html>
