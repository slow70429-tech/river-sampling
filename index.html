<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>河寬水深採樣計算 V6</title>
<meta name="theme-color" content="#0f172a">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:#0f172a;color:#f8fafc;min-height:100vh;padding:8px}
.app{max-width:960px;margin:0 auto}
h1{font-size:21px;text-align:center;margin:4px 0 6px}
.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:10px;margin-bottom:8px}
.top{display:grid;grid-template-columns:1.1fr .9fr;gap:8px}
label{display:block;font-size:17px;font-weight:900;margin-bottom:5px}
input{width:100%;font-size:24px;padding:9px 10px;border-radius:11px;border:2px solid #475569;background:#020617;color:#fff;outline:none}
input:focus{border-color:#38bdf8}
.unit{font-size:12px;color:#cbd5e1;margin-top:4px}
.mode{display:flex;flex-direction:column;justify-content:center}
.mode small{color:#cbd5e1;font-weight:800}
.mode b{font-size:24px;color:#fde68a}
button{width:100%;font-size:18px;font-weight:900;border:0;border-radius:11px;padding:10px;background:#334155;color:#fff;margin-top:8px}
.river{position:relative;height:62px;background:#020617;border:1px solid #334155;border-radius:14px;margin-bottom:8px}
.bar{position:absolute;left:12px;right:12px;top:31px;height:5px;background:#64748b;border-radius:99px}
.mark{position:absolute;top:6px;transform:translateX(-50%);text-align:center;min-width:62px}
.mark .dot{width:11px;height:11px;background:#38bdf8;border-radius:50%;margin:14px auto 1px;border:2px solid #e0f2fe}
.mark .n{font-size:12px;font-weight:950}
.mark .p{font-size:15px;font-weight:950;color:#7dd3fc}
.w0,.wend{position:absolute;top:42px;font-size:11px;color:#cbd5e1;font-weight:800}.w0{left:8px}.wend{right:8px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.box{background:#0b1220;border:1px solid #334155;border-radius:14px;padding:9px}
.head{display:flex;justify-content:space-between;gap:6px;align-items:end;margin-bottom:6px}
.name{font-size:20px;font-weight:950}
.pos{font-size:16px;font-weight:950;color:#7dd3fc}
.mini{font-size:13px;color:#cbd5e1;font-weight:800;margin-bottom:4px}
.box input{font-size:23px;padding:8px}
.rule{font-size:13px;color:#fde68a;font-weight:900;line-height:1.25;margin:6px 0;min-height:32px}
.result{display:grid;gap:5px}
.r{display:grid;grid-template-columns:.8fr 1.2fr;align-items:center;border-top:1px solid #334155;padding-top:5px}
.r .k{font-size:15px;font-weight:900}
.r .v{text-align:right;font-size:21px;font-weight:950;color:#7dd3fc}
.warn{font-size:12px;color:#fecaca;font-weight:800;margin-top:5px}
.summary{font-size:14px;line-height:1.45;color:#e2e8f0}
.summary b{color:#7dd3fc}
.hidden{display:none!important}
@media(max-width:760px){
  body{padding:6px}
  h1{font-size:19px}
  .top{grid-template-columns:1fr 1fr}
  input{font-size:22px}
  .mode b{font-size:20px}
  .grid{grid-template-columns:1fr}
  .box{padding:8px}
  .name{font-size:19px}
  .r .v{font-size:20px}
}
</style>
</head>
<body>
<main class="app">
<h1>河寬水深採樣計算 V6</h1>

<section class="top">
  <div class="card">
    <label for="width">河寬 m</label>
    <input id="width" type="number" inputmode="decimal" min="0" step="0.1" placeholder="25.6">
    <div class="unit">位置顯示小數 1 位</div>
  </div>
  <div class="card mode">
    <small>採樣點</small>
    <b id="mode">—</b>
    <button id="clearBtn" type="button">清除</button>
  </div>
</section>

<section class="river">
  <div class="bar"></div><div class="w0">0m</div><div class="wend" id="endWidth">—</div>
  <div class="mark" id="lineLeft" style="left:25%"><div class="n">左</div><div class="dot"></div><div class="p" id="leftLinePos">—</div></div>
  <div class="mark" id="lineMid" style="left:50%"><div class="n">中</div><div class="dot"></div><div class="p" id="midLinePos">—</div></div>
  <div class="mark" id="lineRight" style="left:75%"><div class="n">右</div><div class="dot"></div><div class="p" id="rightLinePos">—</div></div>
</section>

<section class="grid">
  <div class="box" id="leftCard">
    <div class="head"><div class="name">左岸</div><div class="pos" id="leftPos">—</div></div>
    <div class="mini">水深 cm</div>
    <input id="leftDepth" type="number" inputmode="decimal" min="0" step="1" placeholder="201">
    <div class="rule" id="leftRule">—</div>
    <div class="result" id="leftRows"></div>
    <div class="warn" id="leftWarn"></div>
  </div>

  <div class="box" id="midCard">
    <div class="head"><div class="name">中央</div><div class="pos" id="midPos">—</div></div>
    <div class="mini">水深 cm</div>
    <input id="midDepth" type="number" inputmode="decimal" min="0" step="1" placeholder="204">
    <div class="rule" id="midRule">—</div>
    <div class="result" id="midRows"></div>
    <div class="warn" id="midWarn"></div>
  </div>

  <div class="box" id="rightCard">
    <div class="head"><div class="name">右岸</div><div class="pos" id="rightPos">—</div></div>
    <div class="mini">水深 cm</div>
    <input id="rightDepth" type="number" inputmode="decimal" min="0" step="1" placeholder="198">
    <div class="rule" id="rightRule">—</div>
    <div class="result" id="rightRows"></div>
    <div class="warn" id="rightWarn"></div>
  </div>
</section>

<section class="card">
  <div class="summary" id="summary">輸入河寬與水深後，自動產生摘要。</div>
</section>

</main>

<script>
const $=id=>document.getElementById(id);
const ids=["left","mid","right"];
const zh={left:"左岸",mid:"中央",right:"右岸"};
function num(v){return parseFloat(v)}
function ok(x){return Number.isFinite(x)&&x>0}
function f1(x){return Number.isFinite(x)?(Math.round(x*10)/10).toFixed(1):"—"}
function f2(x){return Number.isFinite(x)?(Math.round(x*100)/100).toFixed(2):"—"}

function rule(cm){
  if(!ok(cm)) return {name:"—",rows:[],warn:"",text:"—"};
  const h=cm/100;
  if(h<=0.5) return {name:"≤50cm：人工確認",rows:[],warn:"SOP 表列從 50cm 以上開始",text:"人工確認"};
  if(h<=1.5){let rows=[["0.6h",h*.6]]; return {name:"50–150cm：0.6h",rows,warn:"",text:rows.map(r=>`${r[0]} ${f2(r[1])}m`).join("、")};}
  if(h<3){let rows=[["0.2h",h*.2],["0.8h",h*.8]]; return {name:"150–300cm：0.2h、0.8h",rows,warn:"",text:rows.map(r=>`${r[0]} ${f2(r[1])}m`).join("、")};}
  let rows=[["0.2h",h*.2],["0.6h",h*.6],["0.8h",h*.8]];
  return {name:"≥300cm：0.2h、0.6h、0.8h",rows,warn:"",text:rows.map(r=>`${r[0]} ${f2(r[1])}m`).join("、")};
}

function rows(el, arr){
  el.innerHTML=arr.map(r=>`<div class="r"><div class="k">${r[0]}</div><div class="v">${f2(r[1])} m</div></div>`).join("");
}

function calc(){
  const w=num($("width").value), valid=ok(w), three=valid&&w>6;
  $("mode").textContent=!valid?"—":(three?"左中右 3 點":"中央 1 點");
  $("endWidth").textContent=valid?f1(w)+"m":"—";
  const p={left:valid?w/4:NaN, mid:valid?w/2:NaN, right:valid?w*3/4:NaN};
  ids.forEach(id=>{
    const t=f1(p[id])+" m";
    $(id+"Pos").textContent=t;
    $(id+"LinePos").textContent=t;
  });
  ["leftCard","rightCard","lineLeft","lineRight"].forEach(id=>$(id).classList.toggle("hidden",!three));

  let active=three?ids:["mid"];
  let out=[];
  ids.forEach(id=>{
    const cm=num($(id+"Depth").value);
    const r=rule(cm);
    $(id+"Rule").textContent=r.name;
    rows($(id+"Rows"),r.rows);
    $(id+"Warn").textContent=r.warn;
    if(active.includes(id)){
      const depth=ok(cm)?`${cm}cm（${f2(cm/100)}m）`:"—";
      out.push(`<b>${zh[id]}</b>｜位置 ${f1(p[id])}m｜水深 ${depth}｜採樣 ${r.text}`);
    }
  });
  $("summary").innerHTML = out.join("<br>");
}
$("clearBtn").addEventListener("click",()=>{ $("width").value=""; ids.forEach(id=>$(id+"Depth").value=""); calc(); });
$("width").addEventListener("input",calc);
ids.forEach(id=>$(id+"Depth").addEventListener("input",calc));
calc();
</script>
</body>
</html>
